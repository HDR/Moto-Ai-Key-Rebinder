plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.hdr.rebindaikey'

    defaultConfig {
        applicationId "com.hdr.rebindaikey"
        minSdk 33
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}